services:
  # PostgreSQL 17 — primary data store
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: onlook
      POSTGRES_PASSWORD: onlook_dev
      POSTGRES_DB: onlook_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlook"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Rails API (port 3000)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://onlook:onlook_dev@postgres:5432/onlook_development
      RAILS_ENV: development
      DIFF_ENGINE_URL: http://engine:8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/rails

  # Phoenix realtime (port 4000)
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      SECRET_KEY_BASE: dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-development
      MIX_ENV: prod

  # Go diff engine (port 8080)
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PHOENIX_URL: http://realtime:4000
      PORT: "8080"
    depends_on:
      - realtime

  # SvelteKit dev server (port 5173)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_URL: http://api:3000
      PUBLIC_WS_URL: ws://realtime:4000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

volumes:
  pgdata:
